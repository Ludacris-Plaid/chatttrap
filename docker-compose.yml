services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hushcircuits
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/hushcircuits?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      GENSMS_API_KEY: "${GENSMS_API_KEY:-demo}"
      FEATHERLESS_API_KEY: "${FEATHERLESS_API_KEY:-demo}"
      CNAM_API_KEY: "${CNAM_API_KEY:-}"
      NOWPAYMENTS_API_KEY: "${NOWPAYMENTS_API_KEY:-}"
      NOWPAYMENTS_IPN_SECRET: "${NOWPAYMENTS_IPN_SECRET:-}"
      ALLOWED_ORIGINS: "http://localhost:3000"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-prod}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  pgdata:
