# Kamailio SIP Proxy - HushCircuits Pro
# Handles header manipulation for caller ID spoofing

globalconfig:
  log_level=3
  log_stderror=no
  log_facility=LOG_LOCAL0

debug=3
fork=yes
children=4

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

loadmodule "tm"
loadmodule "sl"
loadmodule "rr"
loadmodule "pv"
loadmodule "maxfwd"
loadmodule "textops"
loadmodule "siputils"
loadmodule "xlog"

modparam("rr", "enable_full_path", 1)

request_route {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # Strip original P-Asserted-Identity and replace with spoofed
    if (is_method("INVITE")) {
        remove_hf("P-Asserted-Identity");
        remove_hf("Remote-Party-ID");

        # Set spoofed caller ID from custom header
        if ($hdr(X-Spoofed-CID) != $null) {
            append_hf("P-Asserted-Identity: <sip:$hdr(X-Spoofed-CID)@$$(hostip)>\r\n");
            append_hf("Remote-Party-ID: <sip:$hdr(X-Spoofed-CID)@$$(hostip)>\r\n");
        }

        # Route to FreeSWITCH for origination
        route(RELAY);
    }

    if (is_method("BYE|CANCEL|INFO")) {
        route(RELAY);
    }

    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    sl_send_reply("404", "Not Found");
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
}
